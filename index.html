<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kangsium — App Policies</title>
<style>
  :root{--accent:#1a9e96;--ink:#1f2633;--muted:#5b6472;--line:#e6e9ef}
  *{box-sizing:border-box}
  body{margin:0;background:#fff;color:var(--ink);line-height:1.6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:680px;margin:0 auto;padding:40px 20px 64px}
  h1{font-size:1.5rem;margin:.2em 0}
  p.sub{color:var(--muted);margin:.2em 0 2em}
  .app{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:12px 0;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .app .name{font-weight:700}
  .links a{color:var(--accent);text-decoration:none;margin-left:14px;font-size:.95rem}
  .dots{display:inline-flex;gap:5px;margin-right:10px;vertical-align:middle}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block}
  footer{margin-top:40px;border-top:1px solid var(--line);padding-top:16px;color:var(--muted);font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
  <h1>Kangsium — App Policies</h1>
  <p class="sub">Privacy policies and terms of service for Kangsium mobile games.
  Questions? <a href="mailto:jason@kangsium.com">jason@kangsium.com</a></p>

  <div class="app">
    <div class="name">
      <span class="dots"><span class="dot" style="background:#FF5C7C"></span><span class="dot" style="background:#FFD23F"></span><span class="dot" style="background:#4ECDC4"></span></span>
      Bubble Pop
    </div>
    <div class="links">
      <a href="/bubble-pop/privacy/">Privacy</a>
      <a href="/bubble-pop/terms/">Terms</a>
    </div>
  </div>

  <footer>© Kangsium</footer>
</div>
</body>
</html>
